<!DOCTYPE html>
<html>
<head>
<title>Result Portal</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #36d1dc, #5b86e5);
    text-align: center;
    margin: 0;
    color: #333;
}

.header {
    background: #002147;
    color: white;
    padding: 15px;
}

.container {
    margin-top: 30px;
}

input, select, button {
    padding: 10px;
    margin: 10px;
    width: 220px;
    border-radius: 5px;
    border: none;
}

button {
    background: #28a745;
    color: white;
    cursor: pointer;
}

.result-card {
    display: none;
    background: white;
    width: 320px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
    text-align: left;
}

.result-card h3 {
    text-align: center;
    color: #002147;
}

.print-btn {
    background: orange;
    margin-top: 15px;
    width: 100%;
}
</style>

</head>

<body>

<div class="header">
    <h2>Chit Bahal Adarsh Balika Inter College</h2>
    <p>Puranpur, Ambedkar Nagar</p>
</div>

<div class="container">

    <h3>Check Your Result</h3>

    <input type="text" id="roll" placeholder="Enter Roll Number"><br>

    <select id="test">
        <option>Test 1</option>
        <option>Test 2</option>
        <option>Test 3</option>
    </select><br>

    <button onclick="getResult()">Submit</button>

    <div class="result-card" id="card">
        <h3>Student Result</h3>

        <p><b>Name:</b> <span id="name"></span></p>
        <p><b>Class:</b> <span id="class"></span></p>
        <p><b>Subject:</b> <span id="subject"></span></p>
        <p><b>Maximum Marks:</b> <span id="max"></span></p>
        <p><b>Obtained Marks:</b> <span id="marks"></span></p>
        <p><b>Percentage:</b> <span id="per"></span></p>

        <button class="print-btn" onclick="printResult()">Print Result</button>
    </div>

</div>

<script>

function getResult() {

    let roll = document.getElementById("roll").value;
    let test = document.getElementById("test").value;

    // 🔴 YAHAN APNA GOOGLE SCRIPT URL DALO
    let url = "https://script.google.com/macros/s/AKfycbxo5XrUqM1wky1YhCqKXpVFz6QOw-e2SUSygRGU9aDTD-xhMrfWkTDVx7nN1dVgrABMYQ/exec?roll=" + roll + "&test=" + test;

    fetch(url)
    .then(res => res.json())
    .then(data => {

        let max = data.max;
        let marks = data.marks;
        let per = (marks/max)*100;

        document.getElementById("name").innerText = data.name;
        document.getElementById("class").innerText = data.class;
        document.getElementById("subject").innerText = data.subject;
        document.getElementById("max").innerText = max;
        document.getElementById("marks").innerText = marks;
        document.getElementById("per").innerText = per.toFixed(2) + "%";

        document.getElementById("card").style.display = "block";

    })
    .catch(() => alert("Result Not Found"));
}

function printResult() {
    window.print();
}

</script>

</body>
</html>
